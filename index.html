function isMatchPlaying(sortKey) {
  if (!sortKey || sortKey === '99-99T99:99') return false;
  const [monthDay, time] = sortKey.split('T');
  const [month, day] = monthDay.split('-');
  const start = new Date(`2026-${month}-${day}T${time}`);
  const now = new Date();
  return now >= start && now < new Date(start.getTime() + 105 * 60 * 1000);
}

function hasMatchStarted(sortKey) {
  if (!sortKey || sortKey === '99-99T99:99') return false;
  const [monthDay, time] = sortKey.split('T');
  const [month, day] = monthDay.split('-');
  return new Date() >= new Date(`2026-${month}-${day}T${time}`);
}

async function autoLockMatches() {
  try {
    const { db, doc, setDoc, getDoc } = window._fb;
    const ref = doc(db, "config", "locks");
    const snap = await getDoc(ref);
    const locks = snap.exists() ? snap.data() : {};
    let changed = false;
    for (const m of MATCHES) {
      if (!locks[m.id] && hasMatchStarted(m.sortKey)) {
        locks[m.id] = true;
        changed = true;
      }
    }
    if (changed) await setDoc(ref, locks);
  } catch(e) { console.error(e); }
}

function calcPoints(pick, result) {
  if (!result || pick.home === '' || pick.away === '' || pick.home === undefined || pick.away === undefined) return 0;
  const ph = parseInt(pick.home), pa = parseInt(pick.away);
  const rh = result.home, ra = result.away;
  if (isNaN(ph) || isNaN(pa)) return 0;
  if (ph === rh && pa === ra) return 1;
  return 2;
}

  });

  const state = await getMasState();
  const pozosAntes = state.pozos || [];
  const newPool = { matchId, puntos: participants.length * 2, elegibles: participants };
  const allPozos = [...pozosAntes, newPool];

  const pagos = {};
  const pozosLiquidados = [];
  const pozosQuedan = [];

  allPozos.forEach(pozo => {
    const ganadores = acertantes.filter(u => pozo.elegibles.includes(u));
    if (ganadores.length > 0) {
      const premioPerGanador = pozo.puntos / ganadores.length;
      ganadores.forEach(u => { pagos[u] = (pagos[u] || 0) + premioPerGanador; });
      pozosLiquidados.push({ ...pozo, ganadores, premioPerGanador });
    } else {
      pozosQuedan.push(pozo);
    }
  });

  const pozosDespues = pozosQuedan;

  await setDoc(doc(db, 'mas', String(matchId)), {
    participants,
    acertantes,
    pozosAntes,
    newPool,
    pozosLiquidados,
    pozosDespues,
    pagos
  });

  await setDoc(doc(db, 'config', 'mas_state'), { pozos: pozosDespues });

  alert('✓ Partido liquidado');
  renderAdmin();
  renderMas();
}

async function resetMas(matchId) {
  if (!adminUnlocked) return;
  if (!confirm('¿Revertir esta liquidación? Los pozos volverán al estado anterior a este partido.')) return;
  const { db, doc, getDoc, setDoc, deleteDoc } = window._fb;
  const snap = await getDoc(doc(db, 'mas', String(matchId)));
  if (!snap.exists()) { alert('No hay liquidación para revertir.'); return; }
  const s = snap.data();
  await setDoc(doc(db, 'config', 'mas_state'), { pozos: s.pozosAntes || [] });
  await deleteDoc(doc(db, 'mas', String(matchId)));
  alert('✓ Liquidación revertida. Ya puedes volver a liquidar.');
  renderAdmin();
  renderMas();
}

async function renderMas() {
  const matchMap = {};
  MATCHES.forEach(m => { matchMap[m.id] = m; });

  const [state, masHistory, users, RESULTS] = await Promise.all([getMasState(), getMasHistory(), getAllUsers(), getResults()]);

  // Leaderboard: sumar premios del historial
  const balances = {};
  users.forEach(u => { balances[u] = 0; });
  Object.values(masHistory).forEach(s => {
    if (s.pagos) {
      Object.entries(s.pagos).forEach(([u, pts]) => { if (balances[u] !== undefined) balances[u] += pts; });
    } else {
      (s.acertantesElegibles || []).forEach(u => { if (balances[u] !== undefined) balances[u] += s.premioElegible; });
      const noEleg = (s.acertantes || []).filter(u => !(s.acertantesElegibles || []).includes(u));
      noEleg.forEach(u => { if (balances[u] !== undefined) balances[u] += s.premioNoElegible; });
    }
  });
  const sorted = Object.entries(balances).sort((a,b) => b[1]-a[1]);

  // Card pozos activos
  const pozos = state.pozos || [];
  let pozosHtml;
  if (pozos.length === 0) {
    pozosHtml = '<div style="font-size:13px;color:#778da9;margin-top:4px">No hay pozos activos.</div>';
  } else {
    const totalPts = pozos.reduce((sum, p) => sum + p.puntos, 0);
    pozosHtml = pozos.map((p, i) =>
      `<div style="margin-top:10px;padding-top:${i>0?'10px':0};${i>0?'border-top:1px solid #1b2a3b':''}">
        <span style="font-size:22px;font-weight:bold;color:#e63946">${p.puntos} pts</span>
        <div style="font-size:11px;color:#778da9;margin-top:2px">Elegibles: ${p.elegibles.join(', ')}</div>
      </div>`
    ).join('') +
    `<div style="margin-top:10px;font-size:11px;color:#778da9;border-top:1px solid #1b2a3b;padding-top:6px">Total en juego: ${totalPts} pts (${pozos.length} pozo${pozos.length>1?'s':''})</div>`;
  }
  let html = `<div class="card" style="text-align:center">
    <div style="font-size:12px;color:#778da9;margin-bottom:4px">Pozos activos</div>
    ${pozosHtml}
  </div>`;

  // Leaderboard
  html += `<div class="card"><table>
    <tr><th></th><th>Jugador</th><th class="pts">MÁS pts</th></tr>`;
  sorted.forEach(([u,pts],i) => {
    html += `<tr><td class="pos">${i+1}</td><td>${u}${u===currentUser?' (tú)':''}</td><td class="pts">${pts}</td></tr>`;
  });
  html += '</table></div>';

  // Historial
  html += `<div style="display:flex;gap:4px;background:#1b263b;padding:4px;border-radius:10px;margin-bottom:14px">${filterBarHTML(masFilter,'setMasFilter')}</div>`;
  const settled = Object.entries(masHistory).sort((a, b) => {
    const skA = (matchMap[Number(a[0])] || {}).sortKey || '99-99T99:99';
    const skB = (matchMap[Number(b[0])] || {}).sortKey || '99-99T99:99';
    return skA.localeCompare(skB);
  });
  const _todayPfx = getTodayPrefix();
  const _tomorrowMidnight = getTomorrowPrefix() + 'T00:00';
  const filteredSettled = masFilter === 'hoy'
    ? settled.filter(([mid]) => {
        const m = matchMap[Number(mid)];
        return m && (m.sortKey.startsWith(_todayPfx) || m.sortKey === _tomorrowMidnight);
      })
    : settled;
  if (filteredSettled.length === 0) {
    html += `<div class="card" style="color:#778da9;text-align:center">${masFilter === 'hoy' ? 'No hay partidos liquidados hoy.' : 'Aún no hay partidos liquidados.'}</div>`;
  }
  filteredSettled.forEach(([mid, s]) => {
    const m = matchMap[Number(mid)];
    const title = m ? `${m.home} vs ${m.away}` : `Partido ${mid}`;
    const matchResult = RESULTS[Number(mid)];
    const resultScore = matchResult ? ` <b style="color:#e63946">${matchResult.home}-${matchResult.away}</b>` : '';
    const dateLabel = m ? `<span style="font-size:11px;color:#778da9;margin-left:6px">${m.date.split(' · ')[0]}</span>` : '';
    let resultado;
    if (s.pagos) {
      const ganadores = Object.entries(s.pagos).filter(([,pts]) => pts > 0);
      resultado = ganadores.length > 0
        ? ganadores.map(([u, pts]) => `${u} <b style="color:#52b788">+${pts} pts</b>`).join(', ')
        : '<span style="color:#778da9">Nadie acertó — pozos acumulados</span>';
    } else {
      if ((s.acertantesElegibles || []).length > 0) {
        resultado = s.acertantesElegibles.map(u => `${u} <b style="color:#52b788">+${s.premioElegible} pts</b>`).join(', ');
      } else if ((s.acertantes || []).length > 0) {
        resultado = s.acertantes.map(u => `${u} <b style="color:#52b788">+${s.premioNoElegible} pts</b>`).join(', ')
          + ` <span style="color:#778da9">(no elegibles)</span>`;
      } else {
        resultado = '<span style="color:#778da9">Nadie acertó — pozo acumulado</span>';
      }
    }
    const pozoInfo = s.newPool
      ? `Nuevo pozo: ${s.newPool.puntos} pts · Pozos liquidados: ${(s.pozosLiquidados||[]).length}`
      : `Pozo partido: ${s.pozoPartido} pts · Acumulado previo: ${s.pozoAcumuladoAntes} pts`;
    html += `<div class="card">
      <div style="font-weight:bold;margin-bottom:6px">${title}${resultScore}${dateLabel}</div>
      <table>
        <tr><td style="color:#778da9">Participantes</td><td>${s.participants.join(', ')}</td></tr>
        <tr><td style="color:#778da9">Pozos</td><td>${pozoInfo}</td></tr>
        <tr><td style="color:#778da9">Resultado</td><td>${resultado}</td></tr>
      </table>
    </div>`;
  });

  document.getElementById('mas').innerHTML = html;
}

let partidosFilter = 'hoy';
let todosFilter    = 'hoy';
let adminFilter    = 'hoy';
let masFilter      = 'hoy';

function getTodayPrefix() {
  const now = new Date();
  return String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
}

function formatPickTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const today = new Date();
  const sameDay = d.toDateString() === today.toDateString();
  return sameDay
    ? d.toLocaleTimeString('es', {hour:'2-digit', minute:'2-digit'})
    : d.toLocaleDateString('es', {day:'2-digit', month:'2-digit'}) + ' ' + d.toLocaleTimeString('es', {hour:'2-digit', minute:'2-digit'});
}

function getTomorrowPrefix() {
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  return String(tomorrow.getMonth()+1).padStart(2,'0') + '-' + String(tomorrow.getDate()).padStart(2,'0');
}

function applyDateFilter(matches, filter) {
  if (filter === 'hoy') {
    const todayPfx = getTodayPrefix();
    const tomorrowMidnight = getTomorrowPrefix() + 'T00:00';
    return matches.filter(m => m.sortKey.startsWith(todayPfx) || m.sortKey === tomorrowMidnight);
  }
  return matches;
}

function filterBarHTML(active, setFn) {
  return ['hoy','todos'].map(f =>
    `<button onclick="${setFn}('${f}')" style="flex:1;padding:8px 0;border:none;cursor:pointer;border-radius:8px;font-size:13px;` +
    `font-weight:${active===f?'bold':'normal'};` +
    `background:${active===f?'#415a77':'transparent'};` +
    `color:${active===f?'#fff':'#778da9'}">` +
    `${f === 'hoy' ? 'Hoy' : 'Todos'}</button>`
  ).join('');
}

function setPartidosFilter(f) { partidosFilter = f; renderPartidos(); }
function setTodosFilter(f)    { todosFilter    = f; renderTodos();    }
function setAdminFilter(f)    { adminFilter    = f; renderAdmin();    }
function setMasFilter(f)      { masFilter      = f; renderMas();      }

async function renderPartidos() {
  const picks = await getPicks(currentUser);
  const locks = await getLocks();
  const RESULTS = await getResults();
  const sorted = [...MATCHES].sort((a,b) => a.sortKey.localeCompare(b.sortKey));
  const filteredSorted = applyDateFilter(sorted, partidosFilter);
  let html = `<div style="display:flex;gap:4px;background:#1b263b;padding:4px;border-radius:10px;margin-bottom:14px">${filterBarHTML(partidosFilter,'setPartidosFilter')}</div>`;
  if (filteredSorted.length === 0) {
    html += `<div class="card" style="text-align:center;color:#778da9">No hay partidos disponibles para este criterio.</div>`;
    document.getElementById('partidos').innerHTML = html;
    return;
  }
  let lastDate = '';
  filteredSorted.forEach(m => {
    const dateLabel = m.date.includes('·') ? m.date.split(' · ')[0] : m.date;
    if (dateLabel !== lastDate) {
      html += `<div class="group-title">${dateLabel}</div>`;
      lastDate = dateLabel;
    }
    const p = picks[m.id] || {home:'', away:''};
    const result = RESULTS[m.id];
    const locked = !!locks[m.id];
    const playing = !result && isMatchPlaying(m.sortKey);
    const metaDetail = m.date.includes('·') ? m.date.split(' · ').slice(1).join(' · ') : '';
    const savedAtLabel = p.savedAt ? ` · Guardado ${formatPickTime(p.savedAt)}` : '';
    html += `
    <div class="card">
      <div class="match">
        <div class="team">${m.home}</div>
        <input type="number" min="0" id="h_${m.id}" value="${p.home}" onchange="updatePick(${m.id})" ${locked ? 'disabled' : ''}>
        <span class="vs">-</span>
        <input type="number" min="0" id="a_${m.id}" value="${p.away}" onchange="updatePick(${m.id})" ${locked ? 'disabled' : ''}>
        <div class="team">${m.away}</div>
      </div>
      <div class="meta">${m.group}${metaDetail ? ` · ${metaDetail}` : ''}${savedAtLabel}${locked ? ' · 🔒 Cerrado' : ''}${playing ? ' · <span style="color:#4caf50">🟢 En vivo</span>' : ''}${result ? ` · Resultado: ${result.home}-${result.away}` : ''}</div>
      ${result ? `<div class="result" style="text-align:center">Tus puntos: ${calcPoints({home:p.home, away:p.away}, result)}</div>` : ''}
    </div>`;
  });
  document.getElementById('partidos').innerHTML = html;
}

let saveTimeout;
async function updatePick(matchId) {
  const locks = await getLocks();
  if (locks[matchId]) { alert('Este partido ya está cerrado.'); init(); return; }
  const picks = await getPicks(currentUser);
  picks[matchId] = {
    home: document.getElementById('h_'+matchId).value,
    away: document.getElementById('a_'+matchId).value,
    savedAt: new Date().toISOString()
  };
  await savePicks(currentUser, picks);
  clearTimeout(saveTimeout);
  const card = event.target.closest('.card');
  let msg = card.querySelector('.saved');
  if (!msg) {
    msg = document.createElement('div');
    msg.className = 'saved';
    msg.textContent = '✓ Guardado';
    card.appendChild(msg);
  }
  saveTimeout = setTimeout(() => msg.remove(), 1500);
}

async function renderTabla() {
  const users = await getAllUsers();
  const RESULTS = await getResults();
  const picksMap = await getAllPicks(users);
  const scores = [];
  for (const u of users) {
    const picks = picksMap[u];
    let total = 0;
    let exactos = 0;
    let bol = 0;
    MATCHES.forEach(m => {
      const result = RESULTS[m.id];
      if (result && picks[m.id]) {
        const pts = calcPoints(picks[m.id], result);
        total += pts;
        if (pts === 1) exactos++;
        bol++;
      }
    });
    scores.push({user:u, total, exactos, bol, bolPts: bol * 2});
  }
  scores.sort((a,b) => b.bolPts - a.bolPts || b.exactos - a.exactos);
  let html = `<div class="card"><table>
    <tr><th></th><th>Jugador</th><th>Exactos</th><th class="pts">Bol.</th></tr>`;
  scores.forEach((s,i) => {
    html += `<tr><td class="pos">${i+1}</td><td>${s.user}${s.user===currentUser?' (tú)':''}</td><td>${s.exactos}</td><td class="pts">${s.bolPts}</td></tr>`;
  });
  const totalBol = scores.reduce((sum, s) => sum + s.bolPts, 0);
  html += `<tr style="border-top:2px solid #415a77"><td></td><td style="color:#778da9">Total</td><td></td><td class="pts">${totalBol}</td></tr>`;
  html += '</table></div>';
  if (scores.length === 0) html = '<div class="card">Aún no hay resultados cargados.</div>';
  document.getElementById('tabla').innerHTML = html;
}

async function renderTodos() {
  const users = await getAllUsers();
  const [picksMap, RESULTS, pagos] = await Promise.all([getAllPicks(users), getResults(), getPagos()]);
  const sorted = [...MATCHES].sort((a,b) => a.sortKey.localeCompare(b.sortKey));
  const filteredSorted = applyDateFilter(sorted, todosFilter);
  let html = `<div style="display:flex;gap:4px;background:#1b263b;padding:4px;border-radius:10px;margin-bottom:14px">${filterBarHTML(todosFilter,'setTodosFilter')}</div>`;
  if (filteredSorted.length === 0) {
    html += `<div class="card" style="text-align:center;color:#778da9">No hay partidos disponibles para este criterio.</div>`;
    document.getElementById('todos').innerHTML = html;
    return;
  }
  for (const m of filteredSorted) {
    const result = RESULTS[m.id];
    const resultStr = result ? ` · <b style="color:#e63946">${result.home}-${result.away}</b>` : '';
    html += `<div class="card"><div class="meta" style="text-align:left; margin-bottom:6px;"><b>${m.home} vs ${m.away}</b>${resultStr} — ${m.group} · ${m.date}</div><table>`;
    for (const u of users) {
      const p = picksMap[u][m.id];
      const hasPick = p && p.home !== '' && p.home !== undefined;
      const timeLabel = hasPick && p.savedAt ? `<span style="color:#778da9;font-size:10px;margin-left:4px">${formatPickTime(p.savedAt)}</span>` : '';
      const val = hasPick ? `${p.home} - ${p.away}${timeLabel}` : '—';
      const pagoIndicator = hasPick
        ? (!!pagos[`${m.id}_${u}`]
          ? '<span style="color:#52b788;font-size:10px;margin-left:4px">● Pagó</span>'
          : '<span style="color:#e63946;font-size:10px;margin-left:4px">● No pagó</span>')
        : '';
      html += `<tr><td>${u}${u===currentUser?' (tú)':''}${pagoIndicator}</td><td style="text-align:right">${val}</td></tr>`;
    }
    html += '</table></div>';
  }
  document.getElementById('todos').innerHTML = html;
}

  ['partidos','tabla','todos','mas','admin'].forEach(t => {
    document.getElementById(t).classList.toggle('hidden', t !== tab);
  });
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.classList.toggle('active', ['partidos','tabla','todos','mas','admin'][i] === tab);
  });
  if (tab === 'tabla') renderTabla();
  if (tab === 'todos') renderTodos();
  if (tab === 'mas') renderMas();
  if (tab === 'admin') renderAdmin();
}

function waitForFirebase() {
  return new Promise(resolve => {
    if (window._fb) return resolve();
    const i = setInterval(() => {
      if (window._fb) { clearInterval(i); resolve(); }
    }, 50);
  });
}

let _autoLockInterval = null;

async function init() {
  await waitForFirebase();
  if (!_autoLockInterval) {
    autoLockMatches();
    _autoLockInterval = setInterval(autoLockMatches, 60000);
  }
  if (currentUser) {
    document.getElementById('login').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('userLabel').textContent = currentUser;
    await renderPartidos();
  } else {
    document.getElementById('login').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
  }
}

init();
</script>
