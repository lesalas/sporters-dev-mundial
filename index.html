<!DOCTYPE html>

<meta charset="UTF-8">

<title>Spoters Dev Mundial 2026</title>
<style>
  :root {
    --bg-primary:     #0B0F1A;
    --bg-card:        #131826;
    --border-card:    #1E2740;
    --accent-cyan:    #22D3EE;
    --accent-violet:  #A855F7;
    --accent-green:   #34D399;
    --accent-coral:   #F43F5E;
    --text-primary:   #F1F5F9;
    --text-secondary: #94A3B8;
  }
  * { box-sizing: border-box; font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
  body { margin:0; background:var(--bg-primary); color:var(--text-primary); padding-bottom:40px; }
  header { background:var(--bg-card); padding:16px; text-align:center; position:sticky; top:0; z-index:10; }
  header h1 { margin:0; font-size:20px; }
  .tabs { display:flex; background:var(--bg-card); border-bottom:1px solid var(--border-card); }
  .tab { flex:1; padding:12px; text-align:center; cursor:pointer; font-size:14px; }
  .tab.active { background:rgba(34,211,238,0.12); border-bottom:1.5px solid var(--accent-cyan); color:var(--accent-cyan); font-weight:bold; }
  .container { padding:12px; max-width:600px; margin:0 auto; }
  .card { background:var(--bg-card); border-radius:10px; padding:12px; margin-bottom:10px; }
  .match { display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .team { flex:1; text-align:center; font-size:13px; }
  input[type=number] { width:50px; text-align:center; padding:6px; border-radius:6px; border:none; font-size:16px; }
  input[type=number]:disabled { color:var(--text-primary); background:var(--border-card); opacity:1; }
  .vs { padding:0 6px; color:var(--text-secondary); font-size:12px; }
  .meta { font-size:11px; color:var(--text-secondary); margin-top:4px; text-align:center; }
  button { background:var(--accent-violet); color:var(--text-primary); border:none; padding:10px 16px; border-radius:6px; font-size:14px; cursor:pointer; width:100%; margin-top:8px; }
  select, input[type=text] { width:100%; padding:10px; border-radius:6px; border:none; font-size:16px; margin-bottom:8px; background:var(--bg-card); color:var(--text-primary); }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { padding:8px 4px; text-align:left; border-bottom:1px solid var(--border-card); }
  th { color:var(--text-secondary); font-weight:normal; }
  .pos { font-weight:bold; width:24px; }
  .pts { text-align:right; font-weight:bold; color:var(--accent-coral); }
  .saved { color:var(--accent-green); font-size:12px; text-align:center; margin-top:4px; }
  .hidden { display:none; }
  .login { text-align:center; padding:40px 20px; }
  .group-title { font-size:13px; color:var(--text-secondary); margin:16px 0 6px; padding-left:4px; }
  .result { font-size:11px; color:var(--accent-green); }

  @keyframes live-pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  .live-indicator { animation:live-pulse 1.5s ease-in-out infinite; color:var(--accent-green); }

  .match-card { border:1px solid transparent; }
  .match-card.closed  { border-color:var(--border-card); }
  .match-card.live    { border-color:var(--accent-green); box-shadow:0 0 0 1px rgba(52,211,153,0.15); }
  .match-card.pending { border-color:var(--accent-violet); }

  .match-input-pending { background:#1A1430 !important; border:1px solid var(--accent-violet) !important; color:var(--text-primary) !important; }

  .filter-bar-btn { flex:1; padding:8px 0; background:transparent; border:none; cursor:pointer; border-radius:8px; font-size:13px; color:var(--text-secondary); font-weight:normal; }
  .filter-bar-btn.active { background:rgba(34,211,238,0.12); border:0.5px solid var(--accent-cyan); color:var(--accent-cyan); font-weight:bold; }

  .current-user-row td { background:rgba(168,85,247,0.06); }
</style>

async function getAllUsers() {
  try {
    const { db, collection, getDocs } = window._fb;
    const snap = await getDocs(collection(db, "users"));
    return snap.docs.map(d => d.id);
  } catch(e) { console.error(e); return []; }
}

async function getPicks(user) {
  try {
    const { db, doc, getDoc } = window._fb;
    const ref = doc(db, "picks", user);
    const snap = await getDoc(ref);
    return snap.exists() ? snap.data() : {};
  } catch(e) { console.error(e); return {}; }
}

async function getMasState() {
  try {
    const { db, doc, getDoc } = window._fb;
    const snap = await getDoc(doc(db, 'config', 'mas_state'));
    if (!snap.exists()) return { pozos: [] };
    const data = snap.data();
    return data.pozos !== undefined ? data : { pozos: [] };
  } catch(e) { console.error(e); return { pozos: [] }; }
}

async function getMasHistory() {
  try {
    const { db, collection, getDocs } = window._fb;
    const snap = await getDocs(collection(db, 'mas'));
    const map = {};
    snap.docs.forEach(d => { map[d.id] = d.data(); });
    return map;
  } catch(e) { console.error(e); return {}; }
}

async function acreditarSaldo(username, monto, nota) {
  const { db, doc, collection, runTransaction, serverTimestamp } = window._fb;
  const userRef = doc(db, 'users', username);
  const movRef = doc(collection(db, 'movimientosSaldo'));
  await runTransaction(db, async (t) => {
    const userSnap = await t.get(userRef);
    const saldoActual = userSnap.exists() ? (userSnap.data().saldoActual || 0) : 0;
    t.set(userRef, { name: username, saldoActual: saldoActual + monto }, { merge: true });
    t.set(movRef, { usuarioId: username, tipo: 'recarga', monto, fecha: serverTimestamp(), nota: nota || 'Recarga manual', partidoId: null });
  });
}

async function descontarYGuardarPick(username, matchId, home, away) {
  const { db, doc, collection, runTransaction, serverTimestamp } = window._fb;
  const userRef = doc(db, 'users', username);
  const picksRef = doc(db, 'picks', username);
  const pagosRef = doc(db, 'config', 'pagos');
  const movRef = doc(collection(db, 'movimientosSaldo'));
  return await runTransaction(db, async (t) => {
    const [userSnap, picksSnap, pagosSnap] = await Promise.all([t.get(userRef), t.get(picksRef), t.get(pagosRef)]);
    const saldoActual = userSnap.exists() ? (userSnap.data().saldoActual || 0) : 0;
    const picks = picksSnap.exists() ? picksSnap.data() : {};
    const alreadyPaid = pagosSnap.exists() && !!pagosSnap.data()[`${matchId}_${username}`];
    const isNewPick = !alreadyPaid && (!picks[matchId] || picks[matchId].home === '' || picks[matchId].home === undefined);
    if (isNewPick && saldoActual < 2) throw new Error('Saldo insuficiente');
    picks[matchId] = { home, away, savedAt: new Date().toISOString() };
    t.set(picksRef, picks);
    if (isNewPick) {
      const newSaldo = saldoActual - 2;
      t.set(userRef, { name: username, saldoActual: newSaldo }, { merge: true });
      const match = MATCHES.find(m => m.id === matchId);
      const nota = match ? `Pronóstico: ${match.home} vs ${match.away}` : `Pronóstico partido ${matchId}`;
      t.set(movRef, { usuarioId: username, tipo: 'consumo', monto: 2, fecha: serverTimestamp(), nota, partidoId: matchId });
      const pagos = pagosSnap.exists() ? pagosSnap.data() : {};
      pagos[`${matchId}_${username}`] = true;
      t.set(pagosRef, pagos);
      return newSaldo;
    }
    return saldoActual;
  });
}

async function descontarYGuardarPickAlargue(username, matchId, home, away) {
  const { db, doc, collection, runTransaction, serverTimestamp } = window._fb;
  const userRef   = doc(db, 'users', username);
  const picksRef  = doc(db, 'picks', username);
  const pagosRef  = doc(db, 'config', 'pagos');
  const movRef    = doc(collection(db, 'movimientosSaldo'));
  const alKey     = `alargue_${matchId}`;
  return await runTransaction(db, async (t) => {
    const [userSnap, picksSnap, pagosSnap] = await Promise.all([t.get(userRef), t.get(picksRef), t.get(pagosRef)]);
    const saldoActual = userSnap.exists() ? (userSnap.data().saldoActual || 0) : 0;
    const picks = picksSnap.exists() ? picksSnap.data() : {};
    const pagos = pagosSnap.exists() ? pagosSnap.data() : {};
    const alreadyPaid = !!pagos[`${alKey}_${username}`];
    const isNewPick = !alreadyPaid && (!picks[alKey] || picks[alKey].home === '' || picks[alKey].home === undefined);
    if (isNewPick && saldoActual < 2) throw new Error('Saldo insuficiente');
    picks[alKey] = { home, away, savedAt: new Date().toISOString() };
    t.set(picksRef, picks);
    if (isNewPick) {
      const newSaldo = saldoActual - 2;
      t.set(userRef, { name: username, saldoActual: newSaldo }, { merge: true });
      const match = MATCHES.find(m => m.id === matchId);
      const nota = match ? `Pronóstico alargue: ${match.home} vs ${match.away}` : `Pronóstico alargue partido ${matchId}`;
      t.set(movRef, { usuarioId: username, tipo: 'consumo', monto: 2, fecha: serverTimestamp(), nota, partidoId: matchId });
      pagos[`${alKey}_${username}`] = true;
      t.set(pagosRef, pagos);
      return newSaldo;
    }
    return saldoActual;
  });
}

function isMatchPlaying(sortKey) {
  if (!sortKey || sortKey === '99-99T99:99') return false;
  const [monthDay, time] = sortKey.split('T');
  const [month, day] = monthDay.split('-');
  const start = new Date(`2026-${month}-${day}T${time}`);
  const now = new Date();
  return now >= start && now < new Date(start.getTime() + 105 * 60 * 1000);
}

function hasMatchStarted(sortKey) {
  if (!sortKey || sortKey === '99-99T99:99') return false;
  const [monthDay, time] = sortKey.split('T');
  const [month, day] = monthDay.split('-');
  return new Date() >= new Date(`2026-${month}-${day}T${time}`);
}

async function autoLockMatches() {
  try {

    const ref = doc(db, "config", "locks");
    const snap = await getDoc(ref);
    const locks = snap.exists() ? snap.data() : {};
    let changed = false;
    for (const m of MATCHES) {
      if (!locks[m.id] && hasMatchStarted(m.sortKey)) {
        locks[m.id] = true;
        changed = true;
      }
    }
    if (changed) await setDoc(ref, locks);
  } catch(e) { console.error(e); }
}

function calcPoints(pick, result) {
  if (!result || pick.home === '' || pick.away === '' || pick.home === undefined || pick.away === undefined) return 0;
  const ph = parseInt(pick.home), pa = parseInt(pick.away);
  const rh = result.home, ra = result.away;
  if (isNaN(ph) || isNaN(pa)) return 0;
  if (ph === rh && pa === ra) return 1;
  return 2;
}

function isEliminacion(group) {

async function settleMas(matchId) {
  if (!adminUnlocked) return;
  const { db, doc, getDoc, setDoc } = window._fb;
  const existing = await getDoc(doc(db, 'mas', String(matchId)));
  if (existing.exists()) { alert('Este partido ya fue liquidado.'); return; }

  const RESULTS = await getResults();
  const result = RESULTS[matchId];
  if (!result) { alert('Primero carga el resultado del partido.'); return; }

  const users = await getAllUsers();
  const picksMap = await getAllPicks(users);

  const participants = users.filter(u => {
    const p = picksMap[u][matchId];
    return p && p.home !== '' && p.home !== undefined;
  });

  const acertantes = participants.filter(u => {
    const p = picksMap[u][matchId];
    return parseInt(p.home) === result.home && parseInt(p.away) === result.away;
  });

  const state = await getMasState();
  const pozosAntes = state.pozos || [];
  const newPool = { matchId, puntos: participants.length * 2, elegibles: participants };
  const allPozos = [...pozosAntes, newPool];

  const pagos = {};
  const pozosLiquidados = [];
  const pozosQuedan = [];

  allPozos.forEach(pozo => {
    const ganadores = acertantes.filter(u => pozo.elegibles.includes(u));
    if (ganadores.length > 0) {
      const premioPerGanador = pozo.puntos / ganadores.length;
      ganadores.forEach(u => { pagos[u] = (pagos[u] || 0) + premioPerGanador; });
      pozosLiquidados.push({ ...pozo, ganadores, premioPerGanador });
    } else {
      pozosQuedan.push(pozo);
    }
  });

  const pozosDespues = pozosQuedan;

  await setDoc(doc(db, 'mas', String(matchId)), {
    participants,
    acertantes,
    pozosAntes,
    newPool,
    pozosLiquidados,
    pozosDespues,
    pagos
  });

  await setDoc(doc(db, 'config', 'mas_state'), { pozos: pozosDespues });

  alert('✓ Partido liquidado');
  renderAdmin();
  renderMas();
}

async function renderMas() {
  const matchMap = {};
  MATCHES.forEach(m => { matchMap[m.id] = m; });

  const [state, masHistory, users, RESULTS, alargueState, alargueHistory] = await Promise.all([getMasState(), getMasHistory(), getAllUsers(), getResults(), getMasAlargueState(), getMasAlargueHistory()]);

  // Leaderboard: sumar premios del historial
  const balances = {};
  users.forEach(u => { balances[u] = 0; });
  Object.values(masHistory).forEach(s => {
    if (s.pagos) {
      Object.entries(s.pagos).forEach(([u, pts]) => { if (balances[u] !== undefined) balances[u] += pts; });
    } else {
      (s.acertantesElegibles || []).forEach(u => { if (balances[u] !== undefined) balances[u] += s.premioElegible; });
      const noEleg = (s.acertantes || []).filter(u => !(s.acertantesElegibles || []).includes(u));
      noEleg.forEach(u => { if (balances[u] !== undefined) balances[u] += s.premioNoElegible; });
    }
  });
  const sorted = Object.entries(balances).sort((a,b) => b[1]-a[1]);

  // Card pozos activos
  const pozos = state.pozos || [];
  let pozosHtml;
  if (pozos.length === 0) {
    pozosHtml = '<div style="font-size:13px;color:var(--text-secondary);margin-top:4px">No hay pozos activos.</div>';
  } else {
    const totalPts = pozos.reduce((sum, p) => sum + p.puntos, 0);
    pozosHtml = pozos.map((p, i) =>
      `<div style="margin-top:10px;padding-top:${i>0?'10px':0};${i>0?'border-top:1px solid var(--border-card)':''}">
        <span style="font-size:22px;font-weight:bold;color:var(--accent-violet)">${Number(p.puntos).toFixed(2)} pts</span>
        <div style="font-size:11px;color:var(--text-secondary);margin-top:2px">Elegibles: ${p.elegibles.join(', ')}</div>
      </div>`
    ).join('') +
    `<div style="margin-top:10px;font-size:11px;color:var(--text-secondary);border-top:1px solid var(--border-card);padding-top:6px">Total en juego: ${Number(totalPts).toFixed(2)} pts (${pozos.length} pozo${pozos.length>1?'s':''})</div>`;
  }
  let html = `<div class="card" style="text-align:center">
    <div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px">Pozos activos</div>
    ${pozosHtml}
  </div>`;

  // Leaderboard
  html += `<div class="card"><table>
    <tr><th></th><th>Jugador</th><th class="pts">MÁS pts</th></tr>`;
  sorted.forEach(([u,pts],i) => {
    html += `<tr><td class="pos">${i+1}</td><td>${u}${u===currentUser?' (tú)':''}</td><td class="pts">${Number(pts).toFixed(2)}</td></tr>`;
  });
  html += '</table></div>';

  // Historial

    return skA.localeCompare(skB);

  const filteredSettledA = masFilter === 'hoy'
    ? settledA.filter(([mid]) => {

let partidosFilter = 'hoy';
let todosFilter    = 'hoy';
let adminFilter    = 'hoy';
let masFilter      = 'hoy';

function getTodayPrefix() {
  const now = new Date();
  return String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
}

function formatPickTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const today = new Date();
  const sameDay = d.toDateString() === today.toDateString();
  return sameDay
    ? d.toLocaleTimeString('es', {hour:'2-digit', minute:'2-digit'})
    : d.toLocaleDateString('es', {day:'2-digit', month:'2-digit'}) + ' ' + d.toLocaleTimeString('es', {hour:'2-digit', minute:'2-digit'});
}

function getTomorrowPrefix() {
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  return String(tomorrow.getMonth()+1).padStart(2,'0') + '-' + String(tomorrow.getDate()).padStart(2,'0');
}

function applyDateFilter(matches, filter) {
  if (filter === 'hoy') {
    const todayPfx = getTodayPrefix();
    const tomorrowMidnight = getTomorrowPrefix() + 'T00:00';
    return matches.filter(m => m.sortKey.startsWith(todayPfx) || m.sortKey === tomorrowMidnight);
  }
  return matches;
}

function filterBarHTML(active, setFn) {
  return ['hoy','todos'].map(f =>
    `<button onclick="${setFn}('${f}')" class="filter-bar-btn${active===f?' active':''}">` +
    `${f === 'hoy' ? 'Hoy' : 'Todos'}</button>`
  ).join('');
}

function setPartidosFilter(f) { partidosFilter = f; renderPartidos(); }
function setTodosFilter(f)    { todosFilter    = f; renderTodos();    }
function setAdminFilter(f)    { adminFilter    = f; renderAdmin();    }
function setMasFilter(f)      { masFilter      = f; renderMas();      }

async function renderPartidos() {
  const [picks, locks, RESULTS, alargues] = await Promise.all([getPicks(currentUser), getLocks(), getResults(), getAlargues()]);
  const sorted = [...MATCHES].sort((a,b) => a.sortKey.localeCompare(b.sortKey));
  const filteredSorted = applyDateFilter(sorted, partidosFilter);
  let html = `<div style="display:flex;gap:4px;background:var(--bg-card);padding:4px;border-radius:10px;margin-bottom:14px">${filterBarHTML(partidosFilter,'setPartidosFilter')}</div>`;

    html += `<div class="card" style="text-align:center;color:var(--text-secondary)">No hay partidos disponibles para este criterio.</div>`;

      html += `<div class="group-title">${dateLabel}</div>`;

    }
    const p = picks[m.id] || {home:'', away:''};

    const cardState = playing ? 'live' : (locked || result) ? 'closed' : 'pending';
    const metaDetail = m.date.includes('·') ? m.date.split(' · ').slice(1).join(' · ') : '';
    const savedAtLabel = p.savedAt ? ` · Guardado ${formatPickTime(p.savedAt)}` : '';
    const inputDisabled = locked || saldoBloqueado ? 'disabled' : '';
    const inputClass = cardState === 'pending' && !locked && !saldoBloqueado ? 'class="match-input-pending"' : '';
    html += `
    <div class="card match-card ${cardState}">
      <div class="match">
        <div class="team">${m.home}</div>
        <input type="number" min="0" id="h_${m.id}" value="${p.home}" onchange="updatePick(${m.id})" ${inputClass} ${inputDisabled}>
        <span class="vs">-</span>
        <input type="number" min="0" id="a_${m.id}" value="${p.away}" onchange="updatePick(${m.id})" ${inputClass} ${inputDisabled}>
        <div class="team">${m.away}</div>
      </div>
      <div class="meta">${m.group}${metaDetail ? ` · ${metaDetail}` : ''}${savedAtLabel}${locked ? ' · 🔒 Cerrado' : ''}${playing ? ' · <span class="live-indicator">🟢 En vivo</span>' : ''}${result ? ` · Resultado: ${result.home}-${result.away}` : ''}</div>
      ${saldoBloqueado ? '<div style="color:var(--accent-coral);font-size:12px;text-align:center;margin-top:4px">Saldo insuficiente. Recarga enviando tu comprobante.</div>' : ''}

    </div>`;

    if (isEliminacion(m.group)) {
      const alargueData = alargues[m.id];
      const disponible = !!alargueData?.disponible;
      const resultA = alargueData?.resultadoAlargue;
      const pickA = picks[`alargue_${m.id}`];
      const hasPickA = pickA && pickA.home !== '' && pickA.home !== undefined;
      if (disponible || hasPickA || resultA) {
        let inner = '';
        if (disponible && !hasPickA) {
          const btnDisabled = currentBalance < 2 ? 'disabled' : '';
          inner = `
            <div class="match" style="margin:8px 0">
              <input type="number" min="0" id="ha_${m.id}" placeholder="0" style="width:50px;background:#0B0F1A;color:#F1F5F9;border:1px solid var(--accent-cyan);border-radius:6px;text-align:center;padding:6px">

            ${currentBalance < 2 ? '<div style="color:var(--accent-coral);font-size:12px;text-align:center;margin-bottom:6px">Saldo insuficiente para apostar al alargue</div>' : ''}
            <button onclick="apostarAlargue(${m.id})" ${btnDisabled} style="background:var(--accent-violet)">Apostar al alargue (+2 Bs)</button>`;
        } else if (hasPickA) {
          const resultLabel = resultA ? ` · Resultado: ${resultA.home}-${resultA.away}` : (!disponible ? ' · Cerrado' : '');
          const ptsLabel = resultA ? ` · Tus puntos: ${calcPoints(pickA, resultA)}` : '';
          inner = `

          ${inner}
        </div>`;
      }
    }
  });
  document.getElementById('partidos').innerHTML = html;
}

let saveTimeout;
let pickDebounceTimers = {};

async function updatePick(matchId) {
  const cardEl = event.target.closest('.card');
  clearTimeout(pickDebounceTimers[matchId]);
  pickDebounceTimers[matchId] = setTimeout(async () => {
    const locks = await getLocks();
    if (locks[matchId]) { alert('Este partido ya está cerrado.'); init(); return; }
    const home = document.getElementById('h_'+matchId).value;
    const away = document.getElementById('a_'+matchId).value;
    if (home === '' || away === '') return;
    let newBalance;
    try {
      newBalance = await descontarYGuardarPick(currentUser, matchId, home, away);
    } catch(e) {
      if (e.message === 'Saldo insuficiente') {
        alert('Saldo insuficiente. Recarga tu saldo enviando tu comprobante.');
      } else {
        console.error(e);
        alert('Error al guardar el pronóstico.');
      }
      return;
    }
    currentBalance = newBalance;
    updateBalanceDisplay(newBalance);
    clearTimeout(saveTimeout);
    let msg = cardEl.querySelector('.saved');
    if (!msg) {
      msg = document.createElement('div');
      msg.className = 'saved';
      msg.textContent = '✓ Guardado';
      cardEl.appendChild(msg);
    }
    saveTimeout = setTimeout(() => msg.remove(), 1500);
  }, 400);
}

async function renderTabla() {
  const [users, RESULTS, alargues] = await Promise.all([getAllUsers(), getResults(), getAlargues()]);
  const picksMap = await getAllPicks(users);
  const scores = [];
  for (const u of users) {
    const picks = picksMap[u];
    let total = 0;
    let exactos = 0;
    let bol = 0;
    MATCHES.forEach(m => {
      const result = RESULTS[m.id];
      if (result && picks[m.id]) {
        const pts = calcPoints(picks[m.id], result);
        total += pts;
        if (pts === 1) exactos++;
        bol++;
      }
      if (isEliminacion(m.group) && alargues[m.id]?.resultadoAlargue) {
        const pickA = picks[`alargue_${m.id}`];
        if (pickA && pickA.home !== '' && pickA.home !== undefined) {
          const ptsA = calcPoints(pickA, alargues[m.id].resultadoAlargue);
          total += ptsA;
          if (ptsA === 1) exactos++;
          bol++;
        }
      }
    });
    scores.push({user:u, total, exactos, bol, bolPts: bol * 2});
  }
  scores.sort((a,b) => b.bolPts - a.bolPts || b.exactos - a.exactos);
  let html = `<div class="card"><table>
    <tr><th></th><th>Jugador</th><th>Exactos</th><th class="pts">Bol.</th></tr>`;
  scores.forEach((s,i) => {
    html += `<tr><td class="pos">${i+1}</td><td>${s.user}${s.user===currentUser?' (tú)':''}</td><td>${s.exactos}</td><td class="pts">${s.bolPts}</td></tr>`;
  });
  const totalBol = scores.reduce((sum, s) => sum + s.bolPts, 0);
  html += `<tr style="border-top:2px solid #415a77"><td></td><td style="color:#778da9">Total</td><td></td><td class="pts">${totalBol}</td></tr>`;
  html += '</table></div>';
  if (scores.length === 0) html = '<div class="card">Aún no hay resultados cargados.</div>';
  document.getElementById('tabla').innerHTML = html;
}

        const valA = hasPickA ? `${pA.home} - ${pA.away}` : '—';
        const pagoIndA = hasPickA
          ? (!!pagos[`alargue_${m.id}_${u}`]
            ? '<span style="color:var(--accent-green);font-size:10px;margin-left:4px">● Pagó</span>'

      }

  document.getElementById('todos').innerHTML = html;

    html += `<tr>
      <td>${u.id}</td>
      <td style="text-align:right;color:${sc};font-weight:bold">Bs ${u.saldoActual.toFixed(2)}</td>
      <td style="text-align:right;white-space:nowrap">
        <button style="width:auto;margin:0;padding:4px 8px;font-size:12px" onclick="toggleAdminForm('${u.id}')">Acreditar</button>
        <button style="width:auto;margin:0 0 0 4px;padding:4px 8px;font-size:12px;background:var(--accent-coral)" onclick="toggleAdminDescontar('${u.id}')">Descontar</button>
        <button style="width:auto;margin:0 0 0 4px;padding:4px 8px;font-size:12px;background:#415a77" onclick="toggleAdminMovimientos('${u.id}')">Historial</button>
      </td></tr>`;
    if (adminSaldoFormUser === u.id) {
      html += `<tr><td colspan="3" style="padding:8px 4px">
        <input type="number" id="acreditarMonto" placeholder="Monto en Bs" min="1" style="width:130px;margin-bottom:4px">
        <input type="text" id="acreditarNota" placeholder="Nota (opcional)" style="margin-bottom:4px">
        <button style="width:auto;margin:0;padding:6px 14px" onclick="confirmarAcreditar('${u.id}')">✓ Confirmar</button>
      </td></tr>`;
    }
    if (adminDescontarFormUser === u.id) {
      html += `<tr><td colspan="3" style="padding:8px 4px">
        <input type="number" id="descontarMonto" placeholder="Monto en Bs" min="0.01" step="0.01" style="width:130px;margin-bottom:4px">
        <input type="text" id="descontarNota" placeholder="Nota (ej: Corrección 23/06)" style="margin-bottom:4px">
        <button style="width:auto;margin:0;padding:6px 14px;background:var(--accent-coral)" onclick="confirmarDescontar('${u.id}')">✓ Confirmar descuento</button>
      </td></tr>`;
    }
  });
  html += `</table></div>`;

  if (adminMovimientosUser) {
    const movs = await getMovimientos(adminMovimientosUser);
    html += `<div class="card">
      <div style="font-weight:bold;margin-bottom:8px">Historial: ${adminMovimientosUser}</div>
      <table><tr><th>Fecha</th><th>Tipo</th><th style="text-align:right">Bs</th><th>Nota</th></tr>`;
    if (movs.length === 0) {
      html += `<tr><td colspan="4" style="color:var(--text-secondary);text-align:center">Sin movimientos</td></tr>`;
    }
    movs.forEach(mov => {
      const fecha = mov.fecha?.toMillis ? new Date(mov.fecha.toMillis()).toLocaleString('es', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
      const c = mov.tipo === 'recarga' ? 'var(--accent-green)' : 'var(--accent-coral)';
      const signo = mov.tipo === 'recarga' ? '+' : '-';
      html += `<tr>
        <td style="font-size:11px">${fecha}</td>
        <td style="color:${c}">${mov.tipo}</td>
        <td style="text-align:right;color:${c}">${signo}${mov.monto}</td>
        <td style="font-size:11px;color:var(--text-secondary)">${mov.nota || ''}</td>
      </tr>`;
    });
    html += `</table></div>`;
  }

  // — Sección partidos —
  const sortedMatches = [...MATCHES].sort((a,b) => a.sortKey.localeCompare(b.sortKey));
  const filteredAdmin = applyDateFilter(sortedMatches, adminFilter);
  html += `<div style="display:flex;gap:4px;background:var(--bg-card);padding:4px;border-radius:10px;margin-bottom:14px">${filterBarHTML(adminFilter,'setAdminFilter')}</div>`;
  let lastDate = '';
  if (filteredAdmin.length === 0) {
    html += `<div class="card" style="text-align:center;color:var(--text-secondary)">No hay partidos disponibles para este criterio.</div>`;
  }
  filteredAdmin.forEach(m => {
    const dateLabel = m.date.includes('·') ? m.date.split(' · ')[0] : m.date;
    if (dateLabel !== lastDate) {
      html += `<div class="group-title">${dateLabel}</div>`;
      lastDate = dateLabel;
    }
    const locked = !!locks[m.id];
    const r = RESULTS[m.id] || {home:'', away:''};
    const usersWithPick = allUsers.filter(u => {
      const p = picksMap[u][m.id];
      return p && p.home !== '' && p.home !== undefined;
    });
    let pagosBlock = '';
    if (usersWithPick.length > 0) {
      pagosBlock = `<div style="margin-top:8px;border-top:1px solid var(--border-card);padding-top:8px">
        <div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px">Pagos</div>
        <table>`;
      usersWithPick.forEach(u => {
        const paid = !!pagos[`${m.id}_${u}`];
        pagosBlock += `<tr>
          <td>${u}</td>
          <td style="text-align:right">
            <button style="width:auto;margin:0;padding:4px 10px;font-size:12px;background:${paid?'var(--accent-green)':'var(--accent-coral)'}" onclick="togglePago(${m.id}, '${u}', ${!paid})">
              ${paid ? '✓ Pagó' : '✗ No pagó'}
            </button>
          </td>
        </tr>`;
      });
      pagosBlock += `</table></div>`;
    }
    let alargueAdminBlock = '';
    if (isEliminacion(m.group) && r.home !== '') {
      const alargueData = alargues[m.id];
      const disponible = !!alargueData?.disponible;
      const resultA = alargueData?.resultadoAlargue;
      const hubExacto = allUsers.some(u => calcPoints(picksMap[u][m.id] || {}, r) === 1);
      if (!hubExacto || alargueData) {
        alargueAdminBlock = `<div style="margin-top:8px;border-top:1px solid var(--border-card);padding-top:8px">
          <div style="font-size:12px;font-weight:bold;color:var(--accent-cyan);margin-bottom:6px">⚡ Alargue</div>`;
        if (!hubExacto && !alargueData) {
          alargueAdminBlock += `<div style="font-size:11px;color:var(--text-secondary);margin-bottom:6px">Nadie acertó en 90 min.</div>`;
        }
        if (!disponible && !resultA) {
          alargueAdminBlock += `<button style="background:var(--accent-cyan);color:#000;width:auto;padding:6px 14px;font-size:12px;margin-bottom:6px" onclick="setAlargueDisponible(${m.id}, true)">⚡ Abrir alargue</button>`;
        }
        if (disponible) {
          alargueAdminBlock += `<button style="background:var(--accent-coral);width:auto;padding:6px 14px;font-size:12px;margin-bottom:6px" onclick="setAlargueDisponible(${m.id}, false)">🔒 Cerrar alargue</button>`;
        }
        if (alargueData && !disponible && !resultA) {
          alargueAdminBlock += `<div class="match" style="margin-top:4px">
            <input type="number" min="0" id="rah_${m.id}" placeholder="Local" style="width:50px">
            <span class="vs">-</span>
            <input type="number" min="0" id="raa_${m.id}" placeholder="Visita" style="width:50px">
            <button style="width:auto;flex:1;margin:0;font-size:12px" onclick="guardarResultadoAlargue(${m.id})">Guardar resultado alargue</button>
          </div>`;
        }
        if (resultA) {
          const pickersA = allUsers.filter(u => { const pA = picksMap[u][`alargue_${m.id}`]; return pA && pA.home !== '' && pA.home !== undefined; });
          alargueAdminBlock += `<div style="color:var(--accent-cyan);font-size:13px;margin-bottom:4px">Resultado alargue: <b>${resultA.home}-${resultA.away}</b></div>`;
          alargueAdminBlock += pickersA.length > 0
            ? `<div style="font-size:11px;color:var(--text-secondary);margin-bottom:6px">Apostaron: ${pickersA.join(', ')}</div>`
            : `<div style="font-size:11px;color:var(--text-secondary);margin-bottom:6px">Nadie apostó al alargue.</div>`;
          const sAlargue = masAlargueHistory[String(m.id)];
          if (sAlargue) {
            const ganadores = Object.entries(sAlargue.pagos || {}).filter(([,pts]) => pts > 0);
            const ganStr = ganadores.length > 0 ? ganadores.map(([u,pts]) => `${u} (+${Number(pts).toFixed(2)} pts)`).join(', ') : 'Nadie acertó';
            alargueAdminBlock += `<div style="font-size:11px;color:var(--accent-green);margin-bottom:4px">✓ Alargue liquidado · ${ganStr}</div>`;
            alargueAdminBlock += `<button style="background:#415a77;width:auto;padding:6px 14px;font-size:12px;margin-bottom:4px" onclick="resetAlargue(${m.id})">🔄 Reliquidar alargue</button>`;
          } else if (pickersA.length > 0) {
            alargueAdminBlock += `<button style="background:var(--accent-violet);width:auto;padding:6px 14px;font-size:12px;margin-bottom:4px" onclick="settleAlargue(${m.id})">💰 Liquidar alargue</button>`;
          }
        }
        alargueAdminBlock += `</div>`;
      }
    }
    html += `
    <div class="card">
      <div class="meta" style="text-align:left; margin-bottom:6px;"><b>${m.home} vs ${m.away}</b> — ${m.group}</div>
      <div class="match">
        <input type="number" min="0" id="rh_${m.id}" value="${r.home}" style="width:50px">
        <span class="vs">-</span>
        <input type="number" min="0" id="ra_${m.id}" value="${r.away}" style="width:50px">
        <button style="width:auto; flex:1; margin:0;" onclick="saveResult(${m.id})">Guardar resultado</button>
      </div>
      <button style="background:${locked?'var(--accent-green)':'var(--accent-coral)'}" onclick="toggleLock(${m.id}, ${!locked})">
        ${locked ? '🔓 Desbloquear' : '🔒 Bloquear'}
      </button>
      ${pagosBlock}
      ${alargueAdminBlock}
    </div>`;
  });
  // Sección MÁS
  const [masState, masHistory, masResults, masAlargueHistory] = await Promise.all([getMasState(), getMasHistory(), getResults(), getMasAlargueHistory()]);
  html += `<div class="group-title">MÁS — Liquidar partidos</div>`;
  const adminPozos = masState.pozos || [];
  if (adminPozos.length === 0) {
    html += `<div class="card" style="text-align:center;color:var(--text-secondary)">Sin pozos activos</div>`;
  } else {
    html += `<div class="card"><table>`;
    adminPozos.forEach((p, i) => {
      html += `<tr><td style="color:var(--text-secondary)">Pozo ${i+1}</td><td><b style="color:var(--accent-violet)">${Number(p.puntos).toFixed(2)} pts</b> · Elegibles: ${p.elegibles.join(', ')}</td></tr>`;
    });
    html += `</table></div>`;
  }
  let lastGroupMas = '';
  MATCHES.forEach(m => {
    if (!masResults[m.id]) return;
    if (m.group !== lastGroupMas) {
      html += `<div class="group-title">${m.group}</div>`;
      lastGroupMas = m.group;
    }
    const s = masHistory[String(m.id)];
    if (s) {
      let gan;
      if (s.pagos) {
        const ganadores = Object.entries(s.pagos).filter(([,pts]) => pts > 0);
        gan = ganadores.length > 0 ? ganadores.map(([u,pts]) => `${u} (+${Number(pts).toFixed(2)}pts)`).join(', ') : 'Nadie acertó';
      } else {
        gan = (s.acertantesElegibles||[]).length > 0
          ? s.acertantesElegibles.join(', ') + ` (+${Number(s.premioElegible).toFixed(2)} pts)`
          : (s.acertantes||[]).length > 0 ? s.acertantes.join(', ') + ' (no eleg.)' : 'Nadie acertó';
      }
      const totalDist = s.pozosLiquidados ? s.pozosLiquidados.reduce((sum,p) => sum+p.puntos, 0) : (s.pozoPartido + s.pozoAcumuladoAntes);
      html += `<div class="card">
        <b>${m.home} vs ${m.away}</b>
        <div class="meta" style="color:var(--accent-green)">✓ Liquidado · Distribuido: ${Number(totalDist).toFixed(2)} pts · ${gan}</div>
        <button style="background:#415a77;margin-top:6px" onclick="resetMas(${m.id})">🔄 Reliquidar</button>
      </div>`;
    } else {
      html += `<div class="card">
        <b>${m.home} vs ${m.away}</b>
        <div class="meta">Resultado: ${masResults[m.id].home}-${masResults[m.id].away} · Pendiente</div>
        <button onclick="settleMas(${m.id})">💰 Liquidar MÁS</button>
      </div>`;
    }
  });

  document.getElementById('admin').innerHTML = html;
}

function checkAdmin() {
  const pass = document.getElementById('adminPass').value;
  if (pass === ADMIN_PASS) {
    adminUnlocked = true;
    sessionStorage.setItem('admin_ok', '1');
    renderAdmin();
  } else {
    alert('Clave incorrecta');
  }
}

async function toggleLock(matchId, newState) {
  await setLock(matchId, newState);
  renderAdmin();
}

async function togglePago(matchId, userName, paid) {
  await setPago(matchId, userName, paid);
  renderAdmin();
}

async function saveResult(matchId) {
  const h = document.getElementById('rh_'+matchId).value;
  const a = document.getElementById('ra_'+matchId).value;
  await setResult(matchId, h, a);
  await renderAdmin();
}


function showTab(tab) {
  ['partidos','tabla','todos','mas','admin'].forEach(t => {
    document.getElementById(t).classList.toggle('hidden', t !== tab);
  });
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.classList.toggle('active', ['partidos','tabla','todos','mas','admin'][i] === tab);
  });
  if (tab === 'tabla') renderTabla();
  if (tab === 'todos') renderTodos();
  if (tab === 'mas') renderMas();
  if (tab === 'admin') renderAdmin();
}

function waitForFirebase() {
  return new Promise(resolve => {
    if (window._fb) return resolve();
    const i = setInterval(() => {
      if (window._fb) { clearInterval(i); resolve(); }
    }, 50);
  });
}

let _autoLockInterval = null;

async function init() {
  await waitForFirebase();
  if (!_autoLockInterval) {
    autoLockMatches();
    _autoLockInterval = setInterval(autoLockMatches, 60000);
  }
  if (currentUser) {
    document.getElementById('login').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('userLabel').textContent = currentUser;
    await registerUser(currentUser);
    currentBalance = await getUserBalance(currentUser);
    updateBalanceDisplay(currentBalance);
    await renderPartidos();
  } else {
    document.getElementById('login').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
  }
}

init();
</script>
</body>
</html>
